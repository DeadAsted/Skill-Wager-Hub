<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg: #1a1a1a;
            --tg-theme-card: #242424;
            --tg-theme-button: #0088cc;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #aaaaaa;
        }

        body { 
            background: var(--tg-theme-bg); 
            color: var(--tg-theme-text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            -webkit-user-select: none;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance { background: #2c2c2c; padding: 4px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #3d3d3d; }
        
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; color: var(--tg-theme-hint); }

        .duel-card { 
            background: var(--tg-theme-card); 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #333;
        }

        .duel-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .game-name { font-weight: bold; font-size: 16px; margin: 0; }
        .bet-amount { color: #4cd964; font-weight: bold; font-size: 18px; }

        .player-preview { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--tg-theme-hint); }
        .avatar-mini { width: 24px; height: 24px; background: #444; border-radius: 50%; }

        button { 
            background: var(--tg-theme-button); 
            color: white; 
            border: none; 
            padding: 12px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold;
            font-size: 15px;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }
        
        .badge { background: #ff9500; color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div class="section-title">Арена Дуэлей</div>
        <div class="balance">Баланс: <span id="user-balance">0.00</span> ₽</div>
    </div>

    <div id="app">
        <!-- Карточка 1 -->
        <div class="duel-card">
            <div class="duel-info">
                <div>
                    <p class="game-name">CS2 (1x1 Aim) <span class="badge">Hot</span></p>
                    <div class="player-preview">
                        <div class="avatar-mini"></div>
                        <span>@cyber_pro (Рейтинг: 1450)</span>
                    </div>
                </div>
                <div class="bet-amount">100 ₽</div>
            </div>
            <button onclick="acceptDuel(777, 100)">Принять вызов</button>
        </div>

        <!-- Карточка 2 -->
        <div class="duel-card">
            <div class="duel-info">
                <div>
                    <p class="game-name">Dota 2 (Mid Solo)</p>
                    <div class="player-preview">
                        <div class="avatar-mini"></div>
                        <span>@dota_king (Рейтинг: 2100)</span>
                    </div>
                </div>
                <div class="bet-amount">500 ₽</div>
            </div>
            <button onclick="acceptDuel(888, 500)">Принять вызов</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран
        tg.MainButton.setParams({ text: 'СОЗДАТЬ ДУЭЛЬ', is_visible: true, color: '#2ecc71' });

        // Обработка кнопки создания (внизу экрана)
        tg.MainButton.onClick(() => {
            tg.showAlert("Функция создания дуэлей будет доступна в следующем обновлении!");
        });

        function acceptDuel(id, bet) {
            // Подтверждение перед списанием
            tg.showConfirm(`Вы уверены, что хотите принять вызов на ${bet} ₽?`, (ok) => {
                if (ok) {
                    const data = {
                        action: "accept_duel",
                        duel_id: id,
                        amount: bet
                    };
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                }
            });
        }

        // Установка цвета хедера WebApp в цвет темы
        tg.setHeaderColor('secondary_bg_color');
    </script>
</body>
</html>
