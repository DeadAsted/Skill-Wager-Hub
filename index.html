<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- ИСПРАВЛЕНО: Правильный путь к SDK Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --tg-theme-bg: #1a1a1a;
            --tg-theme-card: #242424;
            --tg-theme-button: #0088cc;
            --tg-theme-text: #ffffff;
            --tg-theme-hint: #aaaaaa;
        }

        body {
            background: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            overflow-x: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance { background: #2c2c2c; padding: 4px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #3d3d3d; }
        .section-title { font-size: 18px; font-weight: bold; color: var(--tg-theme-hint); }

        .duel-card {
            background: var(--tg-theme-card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #333;
        }

        .duel-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .game-name { font-weight: bold; font-size: 16px; margin: 0; }
        .bet-amount { color: #4cd964; font-weight: bold; font-size: 18px; }

        .player-preview { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--tg-theme-hint); margin-top: 5px; }
        .avatar-mini { width: 24px; height: 24px; background: #444; border-radius: 50%; display: inline-block; }

        button {
            background: var(--tg-theme-button);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }

        button:active { filter: brightness(1.2); }
        .badge { background: #ff9500; color: black; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="section-title">Арена Дуэлей</div>
        <div class="balance">Баланс: <span id="user-balance">0.00</span> ₽</div>
    </div>

    <div id="app">
        <div class="duel-card">
            <div class="duel-info">
                <div>
                    <p class="game-name">CS2 (1x1 Aim) <span class="badge">Hot</span></p>
                    <div class="player-preview">
                        <div class="avatar-mini"></div>
                        <span>@cyber_pro (1450)</span>
                    </div>
                </div>
                <div class="bet-amount">100 ₽</div>
            </div>
            <button onclick="acceptDuel(777, 100)">Принять вызов</button>
        </div>

        <div class="duel-card">
            <div class="duel-info">
                <div>
                    <p class="game-name">Dota 2 (Mid Solo)</p>
                    <div class="player-preview">
                        <div class="avatar-mini"></div>
                        <span>@dota_king (2100)</span>
                    </div>
                </div>
                <div class="bet-amount">500 ₽</div>
            </div>
            <button onclick="acceptDuel(888, 500)">Принять вызов</button>
        </div>
    </div>

<script>
    // Инициализация объекта Telegram
    const tg = window.Telegram.WebApp;

    // Сразу сообщаем Telegram, что приложение готово
    tg.ready();
    tg.expand();

    function acceptDuel(id, bet) {
        const data = {
            duel_id: id,
            amount: bet
        };

        try {
            // ИСПРАВЛЕНО: Убеждаемся, что данные уходят строкой JSON
            tg.sendData(JSON.stringify(data));
            tg.close();
        } catch (e) {
            console.error("Ошибка отправки данных:", e);
        }
    }
</script>
</body>
</html>
